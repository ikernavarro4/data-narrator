services:
  datanarrator:
    build: .
    container_name: datanarrator-demo
    restart: "no"
    volumes:
      - ./examples:/app/examples

  tests:
    build: .
    container_name: datanarrator-tests
    restart: "no"
    volumes:
      - ./tests:/app/tests
    command: >
      sh -c "pip install pytest --no-cache-dir -q &&
             pytest tests/ -v"
